<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elene 🐱 | Giới thiệu bản thân 🩵</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url("https://i.pinimg.com/originals/89/69/dc/8969dc3e963f6cc6d69b5a0db10ceaa2.jpg") no-repeat center center fixed;
    background-size: cover;
    color: #4a2c2a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 15px;
    overflow-x: hidden;
  }

  h1 {
    margin-top: 30px;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    color: #ff66b3;
    text-align: center;
    text-shadow: 1px 1px #ffd6e8;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #ff99c8; }
    to { text-shadow: 0 0 20px #ff33cc; }
  }

  .card {
    background: rgba(255, 255, 255, 0.88);
    border-radius: 25px;
    box-shadow: 0 6px 25px rgba(255, 105, 180, 0.3);
    padding: 25px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    backdrop-filter: blur(6px);
    margin: 20px 0;
    position: relative;
    overflow: hidden;
  }

  .avatar {
    width: min(120px, 35vw);
    height: min(120px, 35vw);
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff99cc;
    box-shadow: 0 0 15px #ffb6c1;
    margin-bottom: 15px;
  }

  h2 { color: #ff4da6; }

  p {
    font-size: clamp(0.95rem, 2.5vw, 1rem);
    line-height: 1.6;
    margin: 10px 0;
  }

  .btn {
    background: linear-gradient(90deg, #ff80b3, #ffb6c1);
    border: none;
    color: white;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    transition: transform 0.3s;
    margin-top: 12px;
  }

  .btn:hover { transform: scale(1.08); }

  #secret {
    margin-top: 10px;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    color: #ff4da6;
    display: none;
    animation: fadeIn 1.2s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 240, 245, 0.95);
    padding: 25px 35px;
    border-radius: 25px;
    box-shadow: 0 0 25px rgba(255, 105, 180, 0.4);
    text-align: center;
    color: #ff4da6;
    font-size: 1.1rem;
    font-weight: 600;
    opacity: 0;
    z-index: 999;
    transition: opacity 1s ease-in-out;
    animation: popupFade 4s ease-in-out forwards;
  }

  @keyframes popupFade {
    0% { opacity: 0; transform: translate(-50%, -55%); }
    20% { opacity: 1; transform: translate(-50%, -50%); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -45%); }
  }

  .lang-select {
    position: fixed;
    top: 10px;
    right: 15px;
    display: flex;
    gap: 10px;
  }

  .lang-select img {
    width: 30px;
    height: 20px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #fff;
    transition: transform 0.2s;
  }

  .lang-select img:hover {
    transform: scale(1.2);
  }
</style>
</head>
<body>

  <div class="popup" id="popup"></div>

  <div class="lang-select">
    <img src="https://flagcdn.com/w20/vn.png" onclick="changeLang('vi')" title="Tiếng Việt">
    <img src="https://flagcdn.com/w20/gb.png" onclick="changeLang('en')" title="English">
    <img src="https://flagcdn.com/w20/ru.png" onclick="changeLang('ru')" title="Русский">
    <img src="https://flagcdn.com/w20/cn.png" onclick="changeLang('cn')" title="中文">
    <img src="https://flagcdn.com/w20/kr.png" onclick="changeLang('ko')" title="한국어">
    <img src="https://flagcdn.com/w20/de.png" onclick="changeLang('de')" title="Deutsch">
  </div>

  <h1 id="title"></h1>

  <div class="card">

let currentLang = 'vi';

function changeLang(lang) {
  currentLang = lang;
  const d = data[lang];
  document.getElementById("title").innerHTML = d.title;
  document.getElementById("name").innerHTML = d.name;
  document.getElementById("content").innerHTML = d.content;
  document.getElementById("btnText").innerText = d.btn;
  document.getElementById("secret").innerText = "";
  document.getElementById("secret").style.display = "none";
  showPopup(d.popup);
}

function showPopup(text) {
  const popup = document.getElementById('popup');
  popup.innerHTML = text;
  popup.style.opacity = '1';
  setTimeout(() => popup.style.opacity = '0', 4000);
}

function showSecret() {
  const secretDiv = document.getElementById("secret");
  const d = data[currentLang];

  secretDiv.style.display = "block";

</html>
